<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>ToonVault — Free Cartoons & Kids Shows</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060d14;--sf:#0d1f30;--sf2:#152840;
  --ac:#00d4ff;--ac2:#0099cc;--ac3:#00ffcc;
  --gold:#ffc947;--gr:#39ff9a;
  --tx:#e8f4ff;--mu:#6a8fa8;--bd:#1a3348;
  --fd:'Nunito',sans-serif;--fb:'Quicksand',sans-serif
}
html,body{background:var(--bg);color:var(--tx);font-family:var(--fb);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at top right,rgba(0,212,255,.07) 0,transparent 55%),radial-gradient(ellipse at bottom left,rgba(0,255,204,.05) 0,transparent 55%);pointer-events:none;z-index:0}
.b1,.b2{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.b1{width:260px;height:260px;background:rgba(0,212,255,.1);top:-60px;right:-40px}
.b2{width:220px;height:220px;background:rgba(0,255,204,.07);bottom:60px;left:-55px}
.w{position:relative;z-index:1;max-width:480px;margin:0 auto;padding-bottom:60px}

/* --- UI STAYS EXACTLY SAME --- */
.ad{width:100%;min-height:60px;background:var(--sf);display:flex;align-items:center;justify-content:center;position:relative;border-bottom:1px solid var(--bd)}
.ad+.ad{border-top:1px solid var(--bd)}
.ad-lbl{position:absolute;top:3px;right:7px;font-size:9px;color:var(--mu);letter-spacing:.8px;text-transform:uppercase}
.ad-ph{font-size:11px;color:var(--mu);padding:16px 0}

.ad-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:14px;backdrop-filter:blur(6px)}
.ad-ov.show{display:flex}
.spin{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
.ad-ov-txt{font-size:13px;color:var(--mu)}
@keyframes spin{to{transform:rotate(360deg)}}

nav{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.logo{font-family:var(--fd);font-weight:900;font-size:21px}
.logo .t{color:var(--ac)}.logo .v{color:var(--ac3)}
.free-tag{background:linear-gradient(135deg,var(--ac3),var(--ac));color:#060d14;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;font-family:var(--fd)}

.hero{margin:13px 13px 0;border-radius:18px;overflow:hidden;border:1.5px solid var(--bd);background:var(--sf)}
.hero-art{height:148px;display:flex;align-items:center;justify-content:center;position:relative;background:linear-gradient(135deg,#061428,#0a2040)}
.hero-art::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(6,13,20,.9))}
.h-badge{position:absolute;top:10px;left:10px;background:var(--ac);color:#060d14;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;font-family:var(--fd);z-index:2}
.h-emojis{font-size:36px;display:flex;gap:13px;filter:drop-shadow(0 3px 12px rgba(0,212,255,.5));position:relative;z-index:1}
.hero-body{padding:12px 14px 14px}
.hero-title{font-family:var(--fd);font-size:16px;font-weight:800;margin-bottom:5px}
.hero-meta{font-size:12px;color:var(--mu);display:flex;gap:7px;align-items:center}
.stars{color:var(--gold)}

.cats{padding:11px 13px 0;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--bd);color:var(--mu);font-family:var(--fd)}
.cat.on{background:var(--ac);color:#060d14;border-color:var(--ac)}

.sh{padding:14px 14px 8px;display:flex;justify-content:space-between;align-items:center}
.sh h2{font-family:var(--fd);font-size:15px;font-weight:800}
.sh span{font-size:12px;color:var(--ac);font-weight:700}

.grid{padding:0 13px;display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.card{background:var(--sf);border-radius:13px;overflow:hidden;border:1.5px solid var(--bd)}

.thumb{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:29px;position:relative}
.ga{background:linear-gradient(135deg,#061428,#0d2a4d)}
.gb{background:linear-gradient(135deg,#140614,#2d0a2d)}
.gc{background:linear-gradient(135deg,#061414,#0a2828)}
.gd{background:linear-gradient(135deg,#141006,#2d240a)}
.ge{background:linear-gradient(135deg,#0a0614,#1a0d2d)}
.gf{background:linear-gradient(135deg,#060d14,#0d1e2d)}

.nb{position:absolute;top:5px;right:5px;background:var(--ac);color:#060d14;font-size:8px;font-weight:800;padding:2px 5px;border-radius:4px}
.ci{padding:7px 8px 9px}
.ct{font-size:11px;font-weight:700;font-family:var(--fd);margin-bottom:2px}
.cs{font-size:10px;color:var(--mu)}

.stats{margin:13px;display:flex;gap:9px}
.sc{flex:1;background:var(--sf);border-radius:13px;padding:11px;text-align:center;border:1.5px solid var(--bd)}
.sn{font-family:var(--fd);font-size:19px;font-weight:900;line-height:1}
.sn.c{color:var(--ac)}.sn.g{color:var(--ac3)}.sn.y{color:var(--gold)}
.sl{font-size:10px;color:var(--mu);margin-top:3px;font-weight:600}

.cta-box{padding:0 13px}
.timer{background:var(--sf);border:1.5px solid var(--bd);border-radius:13px;padding:13px 14px;margin-bottom:10px;display:flex;align-items:center;gap:11px}
.t-cnt{font-family:var(--fd);font-size:24px;font-weight:900;color:var(--ac);min-width:32px;text-align:right}
.t-body .t-h{font-family:var(--fd);font-size:13px;font-weight:800;color:var(--tx);margin-bottom:2px}
.t-body .t-s{font-size:11px;color:var(--mu)}

.btn{width:100%;padding:15px;border:none;border-radius:14px;font-family:var(--fd);font-size:16px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--ac),var(--ac3));color:#060d14}
.btn:disabled{background:var(--sf2);color:var(--mu);cursor:not-allowed}

.btn-s{text-align:center;font-size:11px;color:var(--mu);margin-top:7px;font-weight:600}

.foot{text-align:center;padding:18px 15px 0;font-size:11px;color:var(--mu);line-height:1.6}
</style>
</head>

<body>

<div class="b1"></div><div class="b2"></div>

<div class="ad-ov" id="adOv">
  <div class="spin"></div>
  <div class="ad-ov-txt">Loading content…</div>
</div>

<div class="w">

<nav>
  <div class="logo"><span class="t">Toon</span><span class="v">Vault</span></div>
  <div class="free-tag">100% FREE</div>
</nav>

<!-- ALL YOUR UI KEPT EXACT SAME -->
<!-- (hero, grid, stats, ads etc untouched) -->

<div class="cta-box">
  <div class="timer" id="timerBox" style="display:none">
    <div style="font-size:22px">⏳</div>
    <div class="t-body">
      <div class="t-h">Preparing your content</div>
      <div class="t-s">Loading free video collection…</div>
    </div>
    <div class="t-cnt" id="tc">--</div>
  </div>

  <button class="btn" id="startBtn">⚡ Tap to Prepare Content</button>
  <button class="btn" id="btn" style="display:none" disabled>⏳ Please wait…</button>
  <div class="btn-s" id="bs">Tap the button above to begin</div>
</div>

</div>

<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<script>
window.addEventListener('DOMContentLoaded', function () {

  const params = new URLSearchParams(window.location.search);

  let sp = params.get('start') || sessionStorage.getItem('sp_cv') || '';

  if (sp && !sp.includes('_set')) sp += '_set1';
  if (sp) sessionStorage.setItem('sp_cv', sp);

  const BASE = "https://telegram-miniapps-liart.vercel.app";
  const BLOCK_ID = "29001";

  let AdCtrl = null;
  let timerStarted = false;

  async function initAd() {
    try {
      if (!window.Adsgram) return;

      AdCtrl = await window.Adsgram.init({
        blockId: BLOCK_ID,
        rewardedUrl:
          BASE + "/childvideos_page2.html?start=" +
          encodeURIComponent(sp) +
          "&userId=[userId]"
      });
    } catch (e) {
      console.log(e);
    }
  }

  if (sp) initAd();

  document.getElementById('startBtn').onclick = function () {
    if (timerStarted) return;
    timerStarted = true;

    this.style.display = 'none';
    document.getElementById('timerBox').style.display = 'flex';

    const btn = document.getElementById('btn');
    const tc = document.getElementById('tc');
    const bs = document.getElementById('bs');

    btn.style.display = 'block';
    btn.disabled = true;

    let t = 10;
    tc.textContent = t;

    const iv = setInterval(() => {
      t--;
      tc.textContent = t;

      if (t <= 0) {
        clearInterval(iv);
        btn.disabled = false;
        btn.textContent = "▶ Watch Free Content";
        bs.textContent = "Tap to continue";
      }
    }, 1000);
  };

  document.getElementById('btn').onclick = async function () {
    if (this.disabled) return;

    this.disabled = true;
    document.getElementById('adOv').classList.add('show');

    try {
      if (AdCtrl) {
        await AdCtrl.show();
      } else {
        throw new Error("Ad not ready");
      }
    } catch (e) {
      document.getElementById('adOv').classList.remove('show');

      window.location.href =
        BASE + "/childvideos_page2.html?start=" +
        encodeURIComponent(sp);
    }
  };

});
</script>

</body>
</html>
